name: Java Docker CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v3

      - name: login to Docker Hub
        run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

      - name: build docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/java-devops-app .

      - name: push docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/java-devops-app